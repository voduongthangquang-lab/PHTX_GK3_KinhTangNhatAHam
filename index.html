<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Kinh Tăng Nhất A-hàm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 style="text-align: center; color: white; margin-bottom: 30px; font-weight: bold; text-transform: uppercase;"> 🏯 TRẮC NGHIỆM MÔN KINH TĂNG NHẤT A-HÀM
</h1>
    <div class="container">
        <div class="quiz-header">
            <h1> Quiz Kinh Tăng Nhất A-hàm</h1>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar"></div>
            </div>
            <p class="progress-text"><span id="currentQuestion">1</span> / <span id="totalQuestions">51</span></p>
        </div>

        <div class="quiz-container">
            <!-- Question Section -->
            <div class="question-section">
                <h2 id="questionText" class="question-text"></h2>
                
                <div class="options-container" id="optionsContainer">
                    <!-- Options will be generated here -->
                </div>
            </div>

            <div class="result-section" id="resultSection" style="display: none;">
                <div class="result-message" id="resultMessage"></div>
                <div class="correct-answer" id="correctAnswerDisplay"></div>
            </div>

            <div class="button-group">
                <button class="btn btn-prev" id="prevBtn" style="display: none;">← Quay lại</button>
                <button class="btn btn-next" id="nextBtn" style="display: none;">Tiếp theo →</button>
                <button class="btn btn-finish" id="finishBtn" style="display: none;">Xem kết quả</button>
            </div>
        </div>

        <div class="final-score" id="finalScore" style="display: none;">
            <h2>🎉 Kết quả bài quiz</h2>
            <div class="score-display">
                <p class="score-text">Bạn đã trả lời đúng:</p>
                <p class="score-number"><span id="correctCount">0</span> / <span id="totalCount">51</span></p>
                <p class="score-percentage" id="scorePercentage">0%</p>
            </div>
            <div class="answer-review" id="answerReview"></div>
            <button class="btn btn-restart" id="restartBtn">Làm lại quiz</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
