<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App: Kinh Tăng Nhất A-hàm</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .quiz-container { width: 300px; margin: auto; }
        .question { font-weight: bold; }
        .options { margin-top: 10px; }
        .option { margin: 5px 0; }
        .button { margin-top: 20px; }
        .hidden { display: none; }
        .result { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div id="quiz" class="quiz">
            <div class="question">Question <span id="question-number"></span>: <span id="question-text"></span></div>
            <div class="options">
                <button class="option" onclick="answerQuestion(0)">Option 1</button>
                <button class="option" onclick="answerQuestion(1)">Option 2</button>
                <button class="option" onclick="answerQuestion(2)">Option 3</button>
                <button class="option" onclick="answerQuestion(3)">Option 4</button>
            </div>
            <button class="button hidden" id="next-button" onclick="nextQuestion()">Next</button>
            <div id="result" class="result hidden"></div>
        </div>
    </div>

    <script>
        const questions = [
            // 51 questions array with the structure: { question: '...', answers: ['...', '...', '...', '...'], correct: index }
        ];
        
        let currentQuestionIndex = 0;
        let score = 0;

        function loadQuestion() {
            const questionData = questions[currentQuestionIndex];
            document.getElementById('question-number').innerText = currentQuestionIndex + 1;
            document.getElementById('question-text').innerText = questionData.question;
            const options = document.getElementsByClassName('option');
            for (let i = 0; i < options.length; i++) {
                options[i].innerText = questionData.answers[i];
                options[i].disabled = false;
            }
            document.getElementById('next-button').classList.add('hidden');
            document.getElementById('result').innerText = '';
        }

        function answerQuestion(selectedIndex) {
            const questionData = questions[currentQuestionIndex];
            if (selectedIndex === questionData.correct) {
                score++;
                document.getElementById('result').innerText = "Correct!";
            } else {
                document.getElementById('result').innerText = "Wrong! The correct answer is: " + questionData.answers[questionData.correct];
            }
            const options = document.getElementsByClassName('option');
            for (let option of options) {
                option.disabled = true;
            }
            document.getElementById('next-button').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showFinalScore();
            }
        }

        function showFinalScore() {
            const quiz = document.getElementById('quiz');
            quiz.innerHTML = `<h2>Your final score is ${score} out of ${questions.length}</h2>`;
        }

        loadQuestion();
    </script>
</body>
</html>
